<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  >

  <title>Santara Closing</title>

  <meta name="theme-color" content="#141318">
  <meta name="background-color" content="#141318">
  <meta name="application-name" content="Santara Closing">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  >

  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png">

  <style>
    :root {
      color-scheme: dark;
      background: #141318;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #141318;
      color: #ffffff;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    #appFrame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      margin: 0;
      padding: 0;
      background: #141318;
      visibility: hidden;
    }

    #loadingScreen,
    #setupScreen {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        calc(24px + env(safe-area-inset-top))
        24px
        calc(24px + env(safe-area-inset-bottom));
      background:
        radial-gradient(
          circle at top,
          rgba(139, 92, 246, 0.18),
          transparent 34%
        ),
        #141318;
    }

    #loadingScreen {
      display: none;
      flex-direction: column;
      gap: 16px;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 4px solid rgba(139, 92, 246, 0.25);
      border-top-color: #8b5cf6;
      border-radius: 999px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .setup-card {
      width: min(100%, 420px);
      padding: 28px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.045);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(16px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }

    .brand img {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      object-fit: cover;
    }

    .brand h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
    }

    .brand p {
      margin: 5px 0 0;
      color: #9ca3af;
      font-size: 13px;
    }

    .description {
      margin: 0 0 18px;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.6;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #e5e7eb;
      font-size: 13px;
      font-weight: 700;
    }

    input {
      width: 100%;
      min-height: 54px;
      padding: 13px 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      outline: none;
      background: rgba(255, 255, 255, 0.04);
      color: #ffffff;
      font-size: 14px;
    }

    input:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
    }

    button {
      width: 100%;
      min-height: 54px;
      margin-top: 14px;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(90deg, #2563eb, #8b5cf6, #e11d48);
      color: white;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .hint {
      margin: 14px 0 0;
      color: #9ca3af;
      font-size: 12px;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <section id="setupScreen">
    <div class="setup-card">
      <div class="brand">
        <img src="./icon-192.png" alt="Logo Santara">

        <div>
          <h1>Santara Closing</h1>
          <p>Pengaturan pertama kali</p>
        </div>
      </div>

      <p class="description">
        Tempel URL deployment Google Apps Script yang berakhiran
        <strong>/exec</strong>. URL hanya perlu dimasukkan satu kali
        pada perangkat ini.
      </p>

      <label for="appsScriptUrl">
        URL Google Apps Script
      </label>

      <input
        id="appsScriptUrl"
        type="url"
        inputmode="url"
        autocomplete="off"
        autocapitalize="off"
        spellcheck="false"
        placeholder="https://script.google.com/macros/s/.../exec"
      >

      <button id="saveButton" type="button">
        Simpan dan Buka Aplikasi
      </button>

      <p class="hint">
        Gunakan URL deployment produksi, bukan URL testing yang
        berakhiran <strong>/dev</strong>.
      </p>
    </div>
  </section>

  <section id="loadingScreen">
    <div class="spinner"></div>
    <div>Memuat Santara Closing...</div>
  </section>

  <iframe
    id="appFrame"
    title="Santara Closing App"
    allow="clipboard-read; clipboard-write; fullscreen"
  ></iframe>

  <script>
    const STORAGE_KEY = "santara-closing-apps-script-url";

    const setupScreen = document.getElementById("setupScreen");
    const loadingScreen = document.getElementById("loadingScreen");
    const appsScriptUrlInput =
      document.getElementById("appsScriptUrl");
    const saveButton = document.getElementById("saveButton");
    const appFrame = document.getElementById("appFrame");

    document.addEventListener("DOMContentLoaded", initializeApp);
    saveButton.addEventListener("click", saveAndOpen);

    appsScriptUrlInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        saveAndOpen();
      }
    });

    function initializeApp() {
      registerServiceWorker();

      const savedUrl = localStorage.getItem(STORAGE_KEY);

      if (savedUrl && isValidAppsScriptUrl(savedUrl)) {
        openApp(savedUrl);
        return;
      }

      showSetup();
    }

    function isValidAppsScriptUrl(value) {
      try {
        const url = new URL(String(value).trim());

        const correctProtocol = url.protocol === "https:";
        const correctHost = url.hostname === "script.google.com";
        const correctPath =
          url.pathname.includes("/macros/s/") &&
          url.pathname.endsWith("/exec");

        return correctProtocol && correctHost && correctPath;
      } catch (error) {
        return false;
      }
    }

    function saveAndOpen() {
      const url = appsScriptUrlInput.value.trim();

      if (!isValidAppsScriptUrl(url)) {
        alert(
          "URL belum benar.

" +
          "Gunakan URL Google Apps Script yang dimulai dengan:
" +
          "https://script.google.com/macros/s/

" +
          "dan berakhiran /exec"
        );

        appsScriptUrlInput.focus();
        return;
      }

      localStorage.setItem(STORAGE_KEY, url);
      openApp(url);
    }

    function openApp(url) {
      setupScreen.style.display = "none";
      loadingScreen.style.display = "flex";
      appFrame.style.visibility = "hidden";

      appFrame.onload = function () {
        loadingScreen.style.display = "none";
        appFrame.style.visibility = "visible";
      };

      appFrame.src = url;
    }

    function showSetup() {
      appFrame.src = "about:blank";
      appFrame.style.visibility = "hidden";
      loadingScreen.style.display = "none";
      setupScreen.style.display = "flex";

      setTimeout(function () {
        appsScriptUrlInput.focus();
      }, 150);
    }

    function registerServiceWorker() {
      if (!("serviceWorker" in navigator)) {
        return;
      }

      window.addEventListener("load", function () {
        navigator.serviceWorker
          .register("./sw.js")
          .catch(function (error) {
            console.error(
              "Service worker gagal didaftarkan:",
              error
            );
          });
      });
    }
  </script>
</body>
</html>
