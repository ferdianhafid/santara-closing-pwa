<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Santara Closing</title>
  <meta name="theme-color" content="#141318">
  <meta name="background-color" content="#141318">
  <meta name="application-name" content="Santara Closing">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png">
  <style>
    :root {
      color-scheme: dark;
      background: #141318;
    }
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #141318;
      color: #ffffff;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    #appFrame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      margin: 0;
      padding: 0;
      background: #141318;
      visibility: hidden;
    }
    #loadingScreen {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: calc(24px + env(safe-area-inset-top)) 24px calc(24px + env(safe-area-inset-bottom));
      background: radial-gradient(circle at top, rgba(139, 92, 246, 0.18), transparent 34%), #141318;
      text-align: center;
    }
    .brand-logo {
      width: 92px;
      height: 92px;
      border-radius: 28px;
      object-fit: cover;
      box-shadow: 0 14px 40px rgba(0,0,0,0.35);
    }
    .brand-title {
      font-size: 28px;
      font-weight: 800;
      margin: 0;
      letter-spacing: 0.02em;
    }
    .brand-subtitle {
      margin: 0;
      color: #a1a1aa;
      font-size: 14px;
    }
    .spinner {
      width: 42px;
      height: 42px;
      border: 4px solid rgba(139, 92, 246, 0.25);
      border-top-color: #8b5cf6;
      border-radius: 999px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    #errorScreen {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #141318;
    }
    .error-card {
      width: min(100%, 420px);
      padding: 28px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.045);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      text-align: center;
    }
    .error-card h2 {
      margin: 0 0 10px;
      font-size: 22px;
    }
    .error-card p {
      margin: 0;
      color: #cbd5e1;
      line-height: 1.6;
      font-size: 14px;
    }
    .retry-button {
      width: 100%;
      min-height: 52px;
      margin-top: 18px;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(90deg, #2563eb, #8b5cf6, #e11d48);
      color: white;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <section id="loadingScreen">
    <img class="brand-logo" src="./icon-192.png" alt="Logo Santara">
    <div>
      <h1 class="brand-title">Santara Closing</h1>
      <p class="brand-subtitle">Memuat aplikasi...</p>
    </div>
    <div class="spinner"></div>
  </section>

  <section id="errorScreen">
    <div class="error-card">
      <h2>Gagal Membuka Aplikasi</h2>
      <p>
        Santara Closing tidak dapat dimuat saat ini.<br>
        Pastikan koneksi internet aktif, lalu coba lagi.
      </p>
      <button class="retry-button" type="button" onclick="reloadApp()">Coba Lagi</button>
    </div>
  </section>

  <iframe id="appFrame" title="Santara Closing App" allow="clipboard-read; clipboard-write; fullscreen"></iframe>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzJcpAE7I8YT5Z3-afH7es-ecfEYaMY1AQ1UycKBC9Y8fPOCnpWdlAcIv_zb8lVMqtuQA/exec';
    const appFrame = document.getElementById('appFrame');
    const loadingScreen = document.getElementById('loadingScreen');
    const errorScreen = document.getElementById('errorScreen');
    let errorTimer = null;

    document.addEventListener('DOMContentLoaded', initializeApp);

    function initializeApp() {
      registerServiceWorker();
      openApp();
    }

    function openApp() {
      loadingScreen.style.display = 'flex';
      errorScreen.style.display = 'none';
      appFrame.style.visibility = 'hidden';

      if (errorTimer) {
        clearTimeout(errorTimer);
      }

      errorTimer = setTimeout(function () {
        if (appFrame.style.visibility !== 'visible') {
          loadingScreen.style.display = 'none';
          errorScreen.style.display = 'flex';
        }
      }, 12000);

      appFrame.onload = function () {
        if (errorTimer) {
          clearTimeout(errorTimer);
        }
        loadingScreen.style.display = 'none';
        errorScreen.style.display = 'none';
        appFrame.style.visibility = 'visible';
      };

      appFrame.src = APPS_SCRIPT_URL;
    }

    function reloadApp() {
      openApp();
    }

    function registerServiceWorker() {
      if (!('serviceWorker' in navigator)) {
        return;
      }

      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js').catch(function (error) {
          console.error('Service worker gagal didaftarkan:', error);
        });
      });
    }
  </script>
</body>
</html>
